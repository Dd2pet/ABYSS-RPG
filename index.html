<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ABYSS - AAA Browser RPG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0a0e27;
            --secondary: #16213e;
            --accent: #e94560;
            --gold: #ffd700;
            --success: #27ae60;
            --warning: #f39c12;
            --text: #ecf0f1;
            --muted: #95a5a6;
        }
        html, body { width: 100%; height: 100%; background: var(--primary); color: var(--text); font-family: 'Arial', sans-serif; overflow: hidden; }
        body { display: flex; flex-direction: column; }
        #app { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; z-index: 1; }
        .screen.active { display: flex; z-index: 10; }
        
        /* Header */
        .header { background: linear-gradient(135deg, #16213e, #0f3460); border-bottom: 2px solid var(--accent); padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; z-index: 50; }
        .stat-badge { background: rgba(0,0,0,0.4); border: 1px solid #34495e; padding: 6px 12px; border-radius: 4px; font-size: 11px; display: flex; gap: 5px; }
        .stat-label { color: var(--muted); }
        .stat-value { color: var(--gold); font-weight: bold; }
        .nav-btn { padding: 8px 12px; font-size: 11px; border: 2px solid var(--accent); background: linear-gradient(135deg, #e94560, #c0392b); color: white; cursor: pointer; border-radius: 4px; }
        .nav-btn.active { background: linear-gradient(135deg, var(--gold), #ffed4e); color: #000; }
        
        /* Content */
        .content { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; }
        
        /* Cards */
        .card { background: linear-gradient(135deg, rgba(22,33,62,0.9), rgba(15,52,96,0.9)); border: 2px solid #34495e; border-radius: 6px; padding: 15px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
        .card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 0 15px rgba(233,69,96,0.3); }
        .card-title { color: var(--gold); font-weight: bold; margin-bottom: 8px; }
        .card-text { font-size: 12px; color: var(--muted); line-height: 1.4; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; }
        .grid-item { aspect-ratio: 1; background: linear-gradient(135deg, rgba(22,33,62,0.8), rgba(15,52,96,0.8)); border: 2px solid #34495e; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; text-align: center; font-size: 10px; }
        .grid-item:hover { border-color: var(--accent); transform: scale(1.05); }
        .grid-item.common { border-color: #999; }
        .grid-item.uncommon { border-color: #1eff00; }
        .grid-item.rare { border-color: #0070dd; }
        .grid-item.epic { border-color: #a335ee; }
        .grid-item.legendary { border-color: #ff8000; }
        .grid-item.mythic { border-color: #e61cff; }
        
        /* Battle */
        .battle-screen { width: 100%; height: 100%; display: flex; flex-direction: column; background: linear-gradient(135deg, #0a0e27, #16213e); }
        .battle-arena { flex: 1; display: flex; justify-content: space-around; align-items: center; padding: 15px; }
        .battle-combatant { text-align: center; width: 100px; }
        .battle-card { background: rgba(22,33,62,0.9); border: 3px solid #34495e; border-radius: 6px; padding: 12px; margin-bottom: 10px; }
        .battle-card.player { border-color: var(--success); box-shadow: 0 0 10px rgba(39,174,96,0.3); }
        .battle-card.enemy { border-color: #c0392b; box-shadow: 0 0 10px rgba(192,57,43,0.3); }
        .hp-bar { background: rgba(0,0,0,0.4); border: 1px solid #34495e; height: 18px; border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
        .hp-fill { height: 100%; background: linear-gradient(90deg, #c0392b, #e74c3c); width: 100%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; font-weight: bold; }
        .battle-log { background: rgba(0,0,0,0.5); border: 1px solid #34495e; border-radius: 4px; padding: 10px; height: 70px; overflow-y: auto; font-size: 10px; margin-bottom: 12px; }
        .log-entry { color: var(--muted); margin-bottom: 3px; }
        .log-entry.damage { color: #e74c3c; }
        .log-entry.heal { color: var(--success); }
        .battle-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .action-btn { padding: 10px; font-size: 11px; background: linear-gradient(135deg, var(--accent), #c0392b); color: white; border: 2px solid var(--accent); border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, #16213e, #0f3460); border: 3px solid var(--accent); border-radius: 8px; padding: 20px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
        .modal-title { color: var(--gold); font-size: 18px; font-weight: bold; margin-bottom: 12px; border-bottom: 2px solid var(--accent); padding-bottom: 8px; }
        .modal-text { color: var(--text); font-size: 12px; line-height: 1.5; margin-bottom: 15px; }
        .modal-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 16px; border: 2px solid var(--accent); background: linear-gradient(135deg, var(--accent), #c0392b); color: white; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(233,69,96,0.4); }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
        
        /* Responsive */
        @media (max-width: 600px) {
            .header { padding: 8px 10px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); }
            .battle-actions { grid-template-columns: 1fr; }
        }
        
        .hidden { display: none !important; }
        h2 { color: var(--gold); margin: 15px 0 10px; font-size: 16px; }
        h3 { color: var(--gold); margin: 10px 0 5px; font-size: 14px; }
        .success-text { color: var(--success); }
        .danger-text { color: #e74c3c; }
        .warning-text { color: var(--warning); }
    </style>
</head>
<body>
<div id="app">
    <!-- ONBOARDING -->
    <div id="onboardingScreen" class="screen active" style="background: linear-gradient(135deg, #0f3460, #16213e); align-items: center; justify-content: center; padding: 20px;">
        <div style="background: linear-gradient(135deg, #2c1810, #3d2817); border: 2px solid #8b7355; border-radius: 6px; padding: 25px; max-width: 450px; text-align: center;">
            <h1 style="color: var(--gold); font-size: 28px; margin-bottom: 20px;">⚔ WELCOME TO ABYSS ⚔</h1>
            <p style="color: #e8dcc0; line-height: 1.6; margin-bottom: 15px; font-size: 13px;">You've been summoned to join the Adventurers' Guild. A world of monsters, magic, and mystery awaits. Will you answer the call?</p>
            <button onclick="startGame()" style="width: 100%; margin-top: 20px;">✍ SIGN CONTRACT</button>
        </div>
    </div>
    
    <!-- CHARACTER CREATION -->
    <div id="charCreationScreen" class="screen" style="background: linear-gradient(135deg, #0a0e27, #16213e); align-items: center; justify-content: center; padding: 20px;">
        <div style="background: rgba(22,33,62,0.9); border: 2px solid var(--accent); border-radius: 8px; padding: 20px; max-width: 400px; width: 100%;">
            <h2 style="text-align: center; margin-bottom: 15px;">CREATE CHARACTER</h2>
            <input type="text" id="charName" placeholder="Name" maxlength="15" style="width: 100%; padding: 8px; margin-bottom: 10px; background: rgba(0,0,0,0.4); border: 1px solid #34495e; color: var(--text); border-radius: 4px;">
            <select id="charClass" style="width: 100%; padding: 8px; margin-bottom: 10px; background: rgba(0,0,0,0.4); border: 1px solid #34495e; color: var(--text); border-radius: 4px;">
                <option value="warrior">⚔ WARRIOR - HP: 150, ATK: 25, DEF: 20</option>
                <option value="rogue">🗡 ROGUE - HP: 100, ATK: 30, DEF: 12</option>
                <option value="mage">✨ MAGE - HP: 80, ATK: 12, DEF: 8</option>
                <option value="paladin">🛡 PALADIN - HP: 130, ATK: 20, DEF: 30</option>
            </select>
            <button onclick="createCharacter()" style="width: 100%;">🎮 START</button>
        </div>
    </div>
    
    <!-- MAIN GAME -->
    <div id="gameScreen" class="screen" style="flex-direction: column;">
        <div class="header">
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <div class="stat-badge"><span class="stat-label">LVL</span><span class="stat-value" id="sLevel">1</span></div>
                <div class="stat-badge"><span class="stat-label">EXP</span><span class="stat-value" id="sExp">0/100</span></div>
                <div class="stat-badge"><span class="stat-label">HP</span><span class="stat-value" id="sHP">100/100</span></div>
                <div class="stat-badge"><span class="stat-label">GOLD</span><span class="stat-value" id="sGold">0</span></div>
                <div class="stat-badge"><span class="stat-label">RANK</span><span class="stat-value" id="sRank">E</span></div>
            </div>
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button class="nav-btn active" onclick="switchTab('explore')">EXPLORE</button>
                <button class="nav-btn" onclick="switchTab('quest')">QUEST</button>
                <button class="nav-btn" onclick="switchTab('inventory')">INV</button>
                <button class="nav-btn" onclick="switchTab('craft')">CRAFT</button>
                <button class="nav-btn" onclick="switchTab('guild')">GUILD</button>
                <button class="nav-btn" onclick="switchTab('stats')">STATS</button>
            </div>
        </div>
        <div class="content" id="gameContent"></div>
    </div>
    
    <!-- BATTLE SCREEN -->
    <div id="battleScreen" class="screen battle-screen">
        <div class="battle-arena">
            <div class="battle-combatant">
                <div class="battle-card player">
                    <div style="color: var(--gold); font-weight: bold; margin-bottom: 5px; font-size: 12px;" id="battlePlayerName">Player</div>
                    <div class="hp-bar"><div class="hp-fill" id="battlePlayerHP" style="width: 100%;"><span id="battlePlayerHPText">100/100</span></div></div>
                </div>
            </div>
            <div style="text-align: center; color: var(--muted);">⚔</div>
            <div class="battle-combatant">
                <div class="battle-card enemy">
                    <div style="color: var(--gold); font-weight: bold; margin-bottom: 5px; font-size: 12px;" id="battleEnemyName">Enemy</div>
                    <div class="hp-bar"><div class="hp-fill" id="battleEnemyHP" style="width: 100%; background: linear-gradient(90deg, #c0392b, #e74c3c);"><span id="battleEnemyHPText">100/100</span></div></div>
                </div>
            </div>
        </div>
        <div class="battle-log" id="battleLog"></div>
        <div class="battle-actions">
            <button class="action-btn" onclick="battle.attack()">⚔ ATTACK</button>
            <button class="action-btn" onclick="battle.defend()">🛡 DEFEND</button>
            <button class="action-btn" onclick="battle.special()">✨ SPECIAL</button>
            <button class="action-btn" onclick="battle.heal()">💚 HEAL</button>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-title" id="modalTitle">Modal</div>
        <div class="modal-text" id="modalText">Content</div>
        <div class="modal-buttons" id="modalButtons"></div>
    </div>
</div>

<script>
const CONFIG = {
    LEVEL_CAP: Infinity,
    BASE_XP: 100,
    XP_MULT: 1.15,
    SAVE_KEY: 'abyss_v2'
};

// Game State
let gameState = {
    player: null,
    inventory: [],
    quests: [],
    guild: null,
    npcs: [],
    events: [],
    battle: null
};

// Load game
function loadGame() {
    const data = localStorage.getItem(CONFIG.SAVE_KEY);
    if (data) {
        gameState = JSON.parse(data);
        return true;
    }
    return false;
}

// Save game
function saveGame() {
    localStorage.setItem(CONFIG.SAVE_KEY, JSON.stringify(gameState));
}

// Player class
class Player {
    constructor(name, classType) {
        this.name = name;
        this.class = classType;
        this.level = 1;
        this.exp = 0;
        this.expRequired = this.getExpRequired(1);
        this.hp = this.getMaxHP();
        this.maxHP = this.getMaxHP();
        this.gold = 0;
        this.stats = this.getStats(classType);
        this.guildRank = 'E';
        this.guildExp = 0;
    }
    
    getStats(classType) {
        const base = {
            warrior: { atk: 25, def: 20, mag: 10, spd: 12 },
            rogue: { atk: 30, def: 12, mag: 15, spd: 22 },
            mage: { atk: 12, def: 8, mag: 35, spd: 18 },
            paladin: { atk: 20, def: 30, mag: 20, spd: 10 }
        };
        return base[classType] || base.warrior;
    }
    
    getMaxHP() { return this.class === 'mage' ? 80 : this.class === 'rogue' ? 100 : this.class === 'paladin' ? 130 : 150; }
    getExpRequired(level) { return Math.floor(CONFIG.BASE_XP * Math.pow(CONFIG.XP_MULT, level - 1)); }
    
    gainExp(amount) {
        this.exp += amount;
        while (this.exp >= this.expRequired) {
            this.exp -= this.expRequired;
            this.levelUp();
        }
        gameState.guild.exp += Math.floor(amount * 0.5);
        checkGuildRankUp();
    }
    
    levelUp() {
        this.level++;
        this.expRequired = this.getExpRequired(this.level);
        this.maxHP = Math.floor(this.getMaxHP() * Math.pow(1.08, this.level - 1));
        this.hp = this.maxHP;
        this.stats.atk = Math.floor(this.stats.atk * 1.08);
        this.stats.def = Math.floor(this.stats.def * 1.08);
        this.stats.mag = Math.floor(this.stats.mag * 1.08);
    }
}

// Monster class
class Monster {
    constructor(level, name, rarity = 'common') {
        this.level = level;
        this.name = name;
        this.rarity = rarity;
        this.hp = this.getMaxHP();
        this.maxHP = this.getMaxHP();
        this.stats = this.getStats();
        this.exp = Math.floor(level * 10 * (1 + level * 0.1));
        this.loot = this.generateLoot();
    }
    
    getMaxHP() {
        const base = 10 + this.level * 1.5;
        const mult = 1 + (Math.random() - 0.5) * 0.4;
        return Math.floor(base * 8 * mult);
    }
    
    getStats() {
        const base = 10 + this.level * 1.5;
        return {
            atk: Math.floor(base * 1.2),
            def: Math.floor(base * 0.8),
            mag: Math.floor(base * 0.6),
            spd: Math.floor(5 + this.level * 0.3)
        };
    }
    
    generateLoot() {
        const names = ['Fang', 'Claw', 'Hide', 'Core', 'Essence', 'Eye', 'Scale', 'Horn'];
        const name = `${this.name}'s ${names[Math.floor(Math.random() * names.length)]}`;
        const rarities = ['common', 'uncommon', 'rare', 'epic', 'legendary'];
        const weights = [0.6, 0.25, 0.1, 0.04, 0.01];
        let rarity = 'common';
        let roll = Math.random();
        let sum = 0;
        for (let i = 0; i < rarities.length; i++) {
            sum += weights[i];
            if (roll <= sum) {
                rarity = rarities[i];
                break;
            }
        }
        const value = Math.floor((10 + this.level * 5) * (1 + rarities.indexOf(rarity) * 0.5));
        return { name, rarity, value };
    }
}

// Battle system
const battle = {
    turn: 0,
    playerDefending: false,
    log: [],
    
    attack() {
        const p = gameState.player;
        const e = gameState.battle.enemy;
        const pDmg = Math.floor((p.stats.atk * (0.8 + Math.random() * 0.4)) - e.stats.def * 0.2);
        const eDmg = Math.floor((e.stats.atk * (0.8 + Math.random() * 0.4)) - p.stats.def * 0.2);
        
        e.hp -= pDmg;
        this.addLog(`${p.name} attacks for ${pDmg} DMG!`, 'damage');
        
        if (e.hp <= 0) {
            this.endBattle(true, pDmg);
            return;
        }
        
        p.hp -= eDmg;
        this.addLog(`${e.name} attacks for ${eDmg} DMG!`, 'damage');
        
        if (p.hp <= 0) {
            this.endBattle(false, pDmg);
        }
        this.updateUI();
    },
    
    defend() {
        this.playerDefending = true;
        const eDmg = Math.floor((gameState.battle.enemy.stats.atk * (0.8 + Math.random() * 0.4)) - gameState.player.stats.def * 0.6);
        gameState.player.hp -= Math.max(1, eDmg);
        this.addLog(`${gameState.player.name} defends! Damage reduced!`, 'heal');
        if (gameState.player.hp <= 0) this.endBattle(false);
        this.updateUI();
    },
    
    special() {
        const p = gameState.player;
        const e = gameState.battle.enemy;
        const pDmg = Math.floor(p.stats.atk * 1.8 - e.stats.def * 0.1);
        e.hp -= pDmg;
        this.addLog(`${p.name} uses SPECIAL! ${pDmg} DMG!`, 'damage');
        if (e.hp <= 0) {
            this.endBattle(true, pDmg);
            return;
        }
        const eDmg = Math.floor(e.stats.atk * 0.6 - p.stats.def * 0.2);
        p.hp -= eDmg;
        this.addLog(`${e.name} strikes back for ${eDmg} DMG!`, 'damage');
        if (p.hp <= 0) this.endBattle(false);
        this.updateUI();
    },
    
    heal() {
        const healed = Math.floor(gameState.player.maxHP * 0.3);
        gameState.player.hp = Math.min(gameState.player.hp + healed, gameState.player.maxHP);
        this.addLog(`${gameState.player.name} heals for ${healed} HP!`, 'heal');
        const eDmg = Math.floor(gameState.battle.enemy.stats.atk * 0.7 - gameState.player.stats.def * 0.2);
        gameState.player.hp -= eDmg;
        if (gameState.player.hp <= 0) this.endBattle(false);
        this.addLog(`${gameState.battle.enemy.name} attacks for ${eDmg} DMG!`, 'damage');
        this.updateUI();
    },
    
    addLog(msg, type = 'normal') {
        this.log.push({ msg, type });
        if (this.log.length > 8) this.log.shift();
    },
    
    updateUI() {
        const p = gameState.player;
        const e = gameState.battle.enemy;
        
        document.getElementById('battlePlayerName').textContent = p.name;
        document.getElementById('battlePlayerHP').style.width = (p.hp / p.maxHP * 100) + '%';
        document.getElementById('battlePlayerHPText').textContent = `${p.hp}/${p.maxHP}`;
        
        document.getElementById('battleEnemyName').textContent = e.name;
        document.getElementById('battleEnemyHP').style.width = (e.hp / e.maxHP * 100) + '%';
        document.getElementById('battleEnemyHPText').textContent = `${e.hp}/${e.maxHP}`;
        
        document.getElementById('battleLog').innerHTML = this.log.map(l => `<div class="log-entry ${l.type}">${l.msg}</div>`).join('');
        document.getElementById('battleLog').scrollTop = document.getElementById('battleLog').scrollHeight;
    },
    
    endBattle(victory) {
        const e = gameState.battle.enemy;
        if (victory) {
            gameState.player.gainExp(e.exp);
            gameState.player.gold += e.loot.value;
            gameState.inventory.push(e.loot);
            this.addLog(`VICTORY! +${e.exp} EXP, +${e.loot.value} GOLD!`, 'heal');
        } else {
            gameState.player.hp = gameState.player.maxHP * 0.5;
            gameState.player.gold = Math.floor(gameState.player.gold * 0.9);
            this.addLog(`DEFEAT! Lost 10% gold!`, 'damage');
        }
        this.updateUI();
        setTimeout(() => {
            gameState.battle = null;
            showScreen('gameScreen');
            switchTab('explore');
            saveGame();
        }, 2000);
    }
};

// Locations
const locations = [
    { name: 'Grasslands', level: 1, emoji: '🌾', monsters: ['Goblin', 'Slime', 'Rat'] },
    { name: 'Dark Forest', level: 5, emoji: '🌲', monsters: ['Wolf', 'Skeleton', 'Bat'] },
    { name: 'Mountain', level: 10, emoji: '⛰', monsters: ['Orc', 'Golem', 'Giant'] },
    { name: 'Volcano', level: 20, emoji: '🌋', monsters: ['Dragon', 'Infernal', 'Demon'] },
    { name: 'Tundra', level: 30, emoji: '❄', monsters: ['Frost Giant', 'Ice Wraith', 'Yeti'] },
    { name: 'Abyss', level: 50, emoji: '🕳', monsters: ['Abyssal', 'Shadow', 'Void'] },
    { name: 'Celestial', level: 100, emoji: '✨', monsters: ['Arch Angel', 'Ancient One', 'God'] },
];

// Crafting recipes
const recipes = [
    { name: 'Health Potion', requires: [{ name: "Goblin's Claw", qty: 2 }], result: { name: 'Health Potion', value: 50 } },
    { name: 'Iron Sword', requires: [{ name: "Orc's Hide", qty: 1 }, { name: "Golem's Core", qty: 1 }], result: { name: 'Iron Sword', value: 200 } },
    { name: 'Mana Elixir', requires: [{ name: "Bat's Eye", qty: 3 }], result: { name: 'Mana Elixir', value: 150 } },
];

// Quests
const questPool = [
    { name: 'Hunt 3 Goblins', target: 'Goblin', count: 3, reward: 100 },
    { name: 'Defeat 5 Slimes', target: 'Slime', count: 5, reward: 200 },
    { name: 'Kill Mountain Boss', target: 'Giant', count: 1, reward: 500 },
];

// UI Functions
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function switchTab(tab) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    
    const content = document.getElementById('gameContent');
    content.innerHTML = '';
    
    if (tab === 'explore') renderExplore();
    else if (tab === 'quest') renderQuests();
    else if (tab === 'inventory') renderInventory();
    else if (tab === 'craft') renderCraft();
    else if (tab === 'guild') renderGuild();
    else if (tab === 'stats') renderStats();
}

function renderExplore() {
    let html = '<h2>⚔ LOCATIONS</h2>';
    locations.forEach(loc => {
        if (gameState.player.level >= loc.level) {
            html += `<div class="card" onclick="startBattle('${loc.name}', '${loc.monsters[0]}')">
                <div class="card-title">${loc.emoji} ${loc.name}</div>
                <div class="card-text">Level: ${loc.level}+ | Monsters here</div>
            </div>`;
        }
    });
    document.getElementById('gameContent').innerHTML = html;
}

function renderQuests() {
    let html = '<h2>📜 QUESTS</h2>';
    questPool.slice(0, 5).forEach((q, i) => {
        html += `<div class="card">
            <div class="card-title">${q.name}</div>
            <div class="card-text">Kill ${q.count} ${q.target} | Reward: ${q.reward} EXP</div>
            <button onclick="acceptQuest(${i})" style="width: 100%; margin-top: 8px;">Accept</button>
        </div>`;
    });
    document.getElementById('gameContent').innerHTML = html;
}

function renderInventory() {
    let html = '<h2>🎒 INVENTORY</h2>';
    if (gameState.inventory.length === 0) {
        html += '<div style="color: var(--muted); text-align: center; margin-top: 20px;">Empty</div>';
    } else {
        html += '<div class="grid">';
        gameState.inventory.forEach((item, i) => {
            html += `<div class="grid-item ${item.rarity}" title="${item.name}">
                💎<br><span style="font-size: 9px;">${item.value}g</span>
            </div>`;
        });
        html += '</div>';
    }
    document.getElementById('gameContent').innerHTML = html;
}

function renderCraft() {
    let html = '<h2>🔨 CRAFTING</h2>';
    recipes.forEach((r, i) => {
        html += `<div class="card">
            <div class="card-title">${r.name}</div>
            <div class="card-text" style="margin-bottom: 8px;">Needs: ${r.requires.map(x => `${x.qty}x ${x.name}`).join(', ')}</div>
            <button onclick="craft(${i})" style="width: 100%;">Craft (${r.result.value}g)</button>
        </div>`;
    });
    document.getElementById('gameContent').innerHTML = html;
}

function renderGuild() {
    const g = gameState.guild;
    const ranks = ['E', 'D', 'C', 'B', 'A', 'S'];
    const rankReqs = [1000, 5000, 25000, 100000, 500000, 2000000];
    const rankIdx = ranks.indexOf(g.rank);
    const nextReq = rankReqs[Math.min(rankIdx + 1, rankReqs.length - 1)];
    const progress = Math.floor((g.exp / nextReq) * 100);
    
    let html = `<h2>⚔ GUILD HALL</h2>
        <div class="card">
            <div class="card-title">Rank ${g.rank}</div>
            <div class="card-text" style="margin-bottom: 8px;">Progress: ${g.exp} / ${nextReq}</div>
            <div style="background: rgba(0,0,0,0.3); height: 16px; border-radius: 3px; overflow: hidden;">
                <div style="background: linear-gradient(90deg, var(--accent), var(--gold)); height: 100%; width: ${progress}%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 10px; font-weight: bold;">${progress}%</div>
            </div>
        </div>
        <div class="card">
            <div class="card-title">BENEFITS</div>
            <div class="card-text">
                🏅 E: Basic Access<br>
                📈 D: +10% EXP<br>
                💰 C: +20% Gold<br>
                👥 B: Companions<br>
                ⭐ A: +50% Drops<br>
                👑 S: Master
            </div>
        </div>`;
    document.getElementById('gameContent').innerHTML = html;
}

function renderStats() {
    const p = gameState.player;
    const html = `<h2>📊 CHARACTER</h2>
        <div class="card">
            <div class="card-title">${p.name} [${p.class.toUpperCase()}]</div>
            <div class="card-text">
                Level ${p.level} | ${p.exp}/${p.expRequired} EXP<br>
                HP: ${p.hp}/${p.maxHP}<br>
                ATK: ${p.stats.atk} | DEF: ${p.stats.def}<br>
                MAG: ${p.stats.mag} | SPD: ${p.stats.spd}<br>
                Gold: ${p.gold}
            </div>
        </div>`;
    document.getElementById('gameContent').innerHTML = html;
}

function startBattle(locName, monsterName) {
    const loc = locations.find(l => l.name === locName);
    const monster = new Monster(loc.level, monsterName);
    gameState.battle = { enemy: monster, turn: 0 };
    battle.log = [];
    battle.turn = 0;
    battle.updateUI();
    showScreen('battleScreen');
}

function acceptQuest(idx) {
    const q = questPool[idx];
    gameState.quests.push({ ...q, progress: 0 });
    showModal('Quest Accepted!', `Find and defeat ${q.count} ${q.target}s!`);
}

function craft(idx) {
    const recipe = recipes[idx];
    let canCraft = true;
    
    recipe.requires.forEach(req => {
        const count = gameState.inventory.filter(i => i.name === req.name).length;
        if (count < req.qty) {
            canCraft = false;
        }
    });
    
    if (canCraft) {
        recipe.requires.forEach(req => {
            for (let i = 0; i < req.qty; i++) {
                const idx = gameState.inventory.findIndex(item => item.name === req.name);
                if (idx !== -1) gameState.inventory.splice(idx, 1);
            }
        });
        gameState.inventory.push(recipe.result);
        saveGame();
        showModal('Crafted!', `Created ${recipe.result.name}!`);
        renderCraft();
    } else {
        showModal('Cannot Craft', 'Missing ingredients!');
    }
}

function checkGuildRankUp() {
    const g = gameState.guild;
    const ranks = ['E', 'D', 'C', 'B', 'A', 'S'];
    const rankReqs = [1000, 5000, 25000, 100000, 500000, 2000000];
    const rankIdx = ranks.indexOf(g.rank);
    
    if (rankIdx < rankReqs.length - 1 && g.exp >= rankReqs[rankIdx + 1]) {
        g.rank = ranks[rankIdx + 1];
        g.exp = 0;
        showModal('🎉 RANK UP!', `Promoted to Rank ${g.rank}!`);
    }
}

function showModal(title, text, buttons = [{ text: 'OK', action: 'close' }]) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalText').textContent = text;
    document.getElementById('modalButtons').innerHTML = buttons.map(b => 
        `<button onclick="${b.action || "closeModal()"}">${b.text}</button>`
    ).join('');
    document.getElementById('modal').classList.add('active');
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
}

function updateStats() {
    const p = gameState.player;
    document.getElementById('sLevel').textContent = p.level;
    document.getElementById('sExp').textContent = `${p.exp}/${p.expRequired}`;
    document.getElementById('sHP').textContent = `${p.hp}/${p.maxHP}`;
    document.getElementById('sGold').textContent = p.gold;
    document.getElementById('sRank').textContent = gameState.guild.rank;
}

function startGame() {
    showScreen('charCreationScreen');
}

function createCharacter() {
    const name = document.getElementById('charName').value.trim();
    const classType = document.getElementById('charClass').value;
    
    if (!name) {
        alert('Enter a name!');
        return;
    }
    
    gameState.player = new Player(name, classType);
    gameState.guild = { rank: 'E', exp: 0 };
    gameState.inventory = [];
    
    updateStats();
    showScreen('gameScreen');
    switchTab('explore');
    saveGame();
}

// Save periodically
setInterval(() => {
    if (gameState.player) {
        saveGame();
    }
}, 5000);

// Load on start
window.addEventListener('load', () => {
    if (loadGame()) {
        gameState.battle = null;
        updateStats();
        showScreen('gameScreen');
        switchTab('explore');
    }
});

// Prevent close during game
window.addEventListener('beforeunload', (e) => {
    if (gameState.player) {
        e.preventDefault();
    }
});
</script>
</body>
</html>
